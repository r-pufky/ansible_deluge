---
###############################################################################
# Feature Flags
###############################################################################

# 1. Automatically add Debian APT sources?
#
# Additional APT components (contrib, non-free, non-free-firmware) are required
# for deluge installation. Original sources.list is disabled.
#
# Alternatively all sources must be manually added outside of this role.
#
# Default: True.
deluge_flg_apt_sources: true

# 2. Install application?
#
# Creates required default directories, users, install packages, download
# software, set minimal deluge.conf if not specified, update and start
# services.
#
# Default: True.
deluge_flg_install: true

# 3. Set configuration files?
#
# Files set using deluge_cfg_*. Stops service and deploys user configuration,
# updates and starts services.
#
# Default: False.
deluge_flg_config: false

# 4. Set permissions?
#
# Recursively create & set permissions for directories in core.conf:
# * download_location
# * move_completed_path
# * plugins_location
# * torrentfiles_location
#
# Special Case:
# * Always use absolute paths.
# * Must be modifiable by root user (e.g. NFS squashed mounts may fail).
# * Locations in /var/opt/deluge will always be set to specified service user.
#
# Disable to managed these directories outside of this role.
#
# Default: False.
deluge_flg_perms: false

###############################################################################
# Service
###############################################################################

# Deluge Logging level.
#
# Values:
#       none: No logging.
#      error: Application errors + critical.
#    warning: Non-fatal warnings + error.
#       info: Informational messages + warning.
#      debug: Everything (includes torrent logs).
#
# Default: 'error'
#
# Reference:
# * https://deluge-torrent.org/troubleshooting/#enable-deluge-logging
deluge_srv_log_level: 'error'

# User that Deluge will run under.
#
# 'media' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'media'.
deluge_srv_user: 'media'

# Group that Deluge will run under.
#
# 'media' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'media'.
deluge_srv_group: 'media'

###############################################################################
# Config
###############################################################################

# Deluge configuration to set.
#
# Ansible controller path to source configuration files (treated as a jinja2
# templates allowing for ansible variable interpretation). Overwrites existing
# config set in /var/opt/deluge/config. Files not sourced will be removed.
#
# Use absolute paths. Paths will be parsed and directories automatically
# created with correct permissions when deluge_flg_perms=true.
#
# A minimally configured template that works with the role will be deployed if
# no config is specified (see templates/default/core.conf).
#
# deluge_cfg_d: 'host_vars/deluge.example.com/config'
#
# Default: '' (use minimally configured default).
#
# Reference:
# * https://nzbget.com/documentation
deluge_cfg_d: ''
