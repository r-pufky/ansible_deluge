---
###############################################################################
# Deluge Role Options
###############################################################################
# Use Debian package for installation.
#
# Updates:
# * Version is determined by build version on release page (see all updates).
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://delugecom.github.io/#debian-repository
# * https://deluge.com

deluge___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-22',
    _debian='trixie',
    _app='2.2.0',
  ) }}"

deluge___app: "{{ {} | r_pufky.data.v3(

    _etc_dir='/etc/opt/deluge',
    _var_dir='/var/opt/deluge',
    _cfg='/var/opt/deluge/config/core.conf',
    _cfg_dir='/var/opt/deluge/config',
    _srv_drop_in='/etc/systemd/system/deluged.service.d/override.conf',
    _web_drop_in='/etc/systemd/system/deluge-web.service.d/override.conf',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

deluge___packages:
  - 'deluged'  # Daemon (required).
  - 'deluge-console'  # CLI interface (required).
  - 'deluge-web'  # WebUI (required).
  - 'unrar'  # Requires: contrib, non-free.
  - 'unzip'  # Provides: zip.
  - '7zip'  # Provides: 7zz.
  - 'p7zip-full'  # Provides: 7za.

deluge___apt_debian_all:
  - name: 'debian'
    types:
      - 'deb'
      - 'deb-src'
    uris: 'http://deb.debian.org/debian'
    suites:
      - 'trixie'
      - 'trixie-updates'
      - 'trixie-backports'
    components:
      - 'main'
      - 'contrib'
      - 'non-free'
      - 'non-free-firmware'
    signed_by: '/usr/share/keyrings/debian-archive-keyring.gpg'
  - name: 'debian-security'
    types:
      - 'deb'
      - 'deb-src'
    uris: 'http://deb.debian.org/debian-security'
    suites:
      - 'trixie-security'
    components:
      - 'main'
      - 'contrib'
      - 'non-free'
      - 'non-free-firmware'
    signed_by: '/usr/share/keyrings/debian-archive-keyring.gpg'

###############################################################################
# Default Deluge User/Group
###############################################################################

deluge___group:
  name: 'media'
  gid: 5555

deluge___user:
  name: 'media'
  group: 'media'
  uid: 5555
  shell: '/usr/sbin/nologin'
  home: '/nonexistent'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
