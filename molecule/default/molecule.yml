---
###############################################################################
# Default
###############################################################################
# Default values results in running service.
#
# core.conf, web.conf are sorted alphabetically by deluge on save; ensure that
# service is running (e.g. configuration does not fail to load) suffices for
# a configuration format check.
#
# Tests:
# * deluged.service active and running.
# * deluge-web.service active and running.
# * /opt/deluge created with correct permissions.
# * Default plugins configurations are rendered correctly.

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
  inventory:
    group_vars:
      all:
        deluge_flg_config: true
        deluge_flg_perms: true
        deluge_cfg_d: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~
            "/templates/default"
          }}'
platforms:
  - name: 'deluge-default'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    published_ports:
      - '8112:8112/tcp'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
