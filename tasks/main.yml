---
- name: 'Prep'
  ansible.builtin.import_tasks: 'prep.yml'

- name: 'Install'
  when: deluge_flg_install
  ansible.builtin.import_tasks: 'install.yml'

- name: 'Config'
  when: deluge_flg_config
  ansible.builtin.import_tasks: 'config.yml'

- name: 'Perms'
  when: deluge_flg_perms
  ansible.builtin.import_tasks: 'perms.yml'

- name: 'Start'
  ansible.builtin.import_tasks: 'start.yml'
